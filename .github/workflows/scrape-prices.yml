name: Scrape webshop prices
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/scrape-prices.ts
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update prices from webshops'
          title: 'Árak frissítése webshopokból'
          body: 'Automatikus árfrisssítés a webshopokból.'
          branch: auto/price-update
          delete-branch: true
